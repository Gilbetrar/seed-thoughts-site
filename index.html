<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seed Thoughts & Synchronicity</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #FFF8F0;
            color: #4A3728;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            color: #8B6914;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #7D5A8A;
            font-style: italic;
            margin-bottom: 2rem;
        }

        .coming-soon {
            font-size: 1.1rem;
            color: #6B5344;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(to right, #C9A84C, #7D5A8A);
            margin: 1.5rem auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Seed Thoughts &amp; Synchronicity</h1>
        <p class="subtitle">A Guide to Your Inner Wisdom</p>
        <div class="divider"></div>
        <p class="coming-soon">Coming Soon</p>
    </div>
</body>
</html>
